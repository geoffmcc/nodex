---
# Nodex embedded playbook: check-updates (read-only).
#
# Collects pending updates, a dist-upgrade simulation for security
# classification, the reboot-required marker, and failed systemd units on
# Debian/Ubuntu hosts. Installs nothing and changes nothing except the apt
# metadata cache refresh (which requires privilege escalation for that one
# task only).
- name: Check for pending updates
  hosts: all
  gather_facts: true
  become: false
  tasks:
    - name: Verify Debian family
      ansible.builtin.assert:
        that: ansible_facts['os_family'] == 'Debian'
        fail_msg: "unsupported distribution: only Debian and Ubuntu are supported"

    - name: Refresh package metadata
      ansible.builtin.apt:
        update_cache: true
      become: true
      changed_when: false

    - name: List upgradable packages
      ansible.builtin.command: apt list --upgradable
      register: nodex_upgradable
      changed_when: false

    - name: Simulate dist-upgrade
      ansible.builtin.command: apt-get -s dist-upgrade
      register: nodex_upgrade_simulation
      changed_when: false

    - name: Check reboot-required marker
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: nodex_reboot_required

    - name: List failed systemd units
      ansible.builtin.command: systemctl list-units --state=failed --no-legend --plain
      register: nodex_failed_units
      changed_when: false
      failed_when: false

    - name: Report root filesystem usage
      ansible.builtin.command: df -P /
      register: nodex_root_usage
      changed_when: false
